<!DOCTYPE html>
<!--
  deep-research report template. Self-contained (no external assets).
  To produce a report: clone this file and replace the marked slots:
    {{TITLE}}        report title
    {{DATE}}         e.g. 2026-06-01
    {{QUERY}}        the original research question
    {{TIER}}         simple | standard | deep
    {{VERIFY_CLASS}} "ok" if 0 flagged, else "warn"
    {{VERIFY_TEXT}}  e.g. "18 claims checked · 17 supported · 1 flagged"
    {{SUMMARY}}      2-4 sentence executive summary (HTML)
    {{BODY}}         the report body: <section><h2>..</h2><p>..</p></section> blocks.
                     Cite claims with <a class="cite" href="#s3">3</a> (renders as superscript [3]).
    {{SOURCES}}      <li id="s1"><span class="num">1</span> ... </li> entries (see example below)
  Keep it one file. Works offline; prints cleanly.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root{
    --ink:#1a1a2e; --muted:#5b6472; --line:#e6e8ee; --bg:#ffffff;
    --accent:#4f46e5; --accent-soft:#eef0ff;
    --ok-bg:#e9f8ef; --ok-ink:#1c7a45; --warn-bg:#fdf3e3; --warn-ink:#a15c14;
    --web:#3b82f6; --academic:#8b5cf6; --code:#10b981; --tag-ink:#fff;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font:18px/1.7 Georgia,"Iowan Old Style",Charter,serif;
    padding:48px 20px 96px;
  }
  .wrap{max-width:760px;margin:0 auto}
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  h1{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
     font-size:2.1rem;line-height:1.2;letter-spacing:-.02em;margin:0 0 .35em;font-weight:800}
  h1::after{content:"";display:block;width:64px;height:4px;border-radius:4px;background:var(--accent);margin-top:.5rem}
  h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
     font-size:1.4rem;font-weight:700;letter-spacing:-.01em;margin:2.4em 0 .5em;padding-top:.4em}
  h3{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
     font-size:1.12rem;font-weight:700;margin:1.6em 0 .4em}
  p{margin:0 0 1em}
  .meta{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.8rem;color:var(--muted);
        margin:0 0 1.6rem;display:flex;flex-wrap:wrap;gap:.4rem 1.2rem}
  .meta b{color:var(--ink);font-weight:600}
  .verify{display:flex;align-items:center;gap:.6rem;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
          font-size:.92rem;border-radius:10px;padding:.7rem 1rem;margin:0 0 2rem}
  .verify.ok{background:var(--ok-bg);color:var(--ok-ink)}
  .verify.warn{background:var(--warn-bg);color:var(--warn-ink)}
  .verify .dot{width:9px;height:9px;border-radius:50%;background:currentColor;flex:none}
  .summary{background:var(--accent-soft);border-left:4px solid var(--accent);
           border-radius:0 10px 10px 0;padding:1.1rem 1.3rem;margin:0 0 2rem;font-size:1.02rem}
  .summary p:last-child{margin-bottom:0}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  a.cite{font-size:.62em;vertical-align:super;font-weight:700;font-family:-apple-system,sans-serif;
         padding:0 .12em;text-decoration:none}
  a.cite::before{content:"["} a.cite::after{content:"]"}
  table{border-collapse:collapse;width:100%;font-size:.92rem;margin:1.2em 0;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  th,td{border-bottom:1px solid var(--line);padding:.55rem .6rem;text-align:left;vertical-align:top}
  th{font-weight:700;background:#fafbfc}
  blockquote{margin:1.2em 0;padding:.2em 0 .2em 1.1em;border-left:3px solid var(--line);color:var(--muted);font-style:italic}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em;background:#f4f5f8;padding:.1em .35em;border-radius:5px}
  hr{border:none;border-top:1px solid var(--line);margin:2.4em 0}
  .sources{margin-top:1.2rem}
  .sources h2{margin-bottom:.8rem}
  ol.srclist{list-style:none;margin:0;padding:0;counter-reset:none}
  ol.srclist li{position:relative;padding:.7rem 0 .7rem 2.4rem;border-bottom:1px solid var(--line);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:.93rem;line-height:1.5}
  ol.srclist li .num{position:absolute;left:0;top:.7rem;width:1.7rem;height:1.7rem;border-radius:50%;
    background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:.8rem;
    display:flex;align-items:center;justify-content:center}
  ol.srclist .title{font-weight:600;color:var(--ink)}
  ol.srclist .url{display:block;color:var(--muted);font-family:ui-monospace,Menlo,monospace;font-size:.78rem;word-break:break-all;margin-top:.1rem}
  .tag{display:inline-block;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    color:var(--tag-ink);border-radius:5px;padding:.08rem .4rem;margin-left:.4rem;vertical-align:middle}
  .tag.web{background:var(--web)} .tag.academic{background:var(--academic)} .tag.code{background:var(--code)}
  .flag{color:var(--warn-ink);font-weight:600}
  footer{margin-top:3rem;padding-top:1.2rem;border-top:1px solid var(--line);
    font-family:-apple-system,sans-serif;font-size:.78rem;color:var(--muted)}
  @media (max-width:600px){body{padding:28px 16px 64px;font-size:17px}h1{font-size:1.7rem}}
  @media print{
    body{padding:0;font-size:11pt;color:#000}
    a{color:#000}.summary,.verify{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    h2{page-break-after:avoid}ol.srclist li{page-break-inside:avoid}
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>{{TITLE}}</h1>
  <div class="meta">
    <span><b>Query:</b> {{QUERY}}</span>
    <span><b>Depth:</b> {{TIER}}</span>
    <span><b>Date:</b> {{DATE}}</span>
  </div>

  <div class="verify {{VERIFY_CLASS}}"><span class="dot"></span><span>{{VERIFY_TEXT}}</span></div>

  <div class="summary">{{SUMMARY}}</div>

  {{BODY}}

  <hr>
  <div class="sources">
    <h2>Sources</h2>
    <ol class="srclist">
      {{SOURCES}}
      <!-- example entry:
      <li id="s1"><span class="num">1</span>
        <span class="title">Anthropic — How we built our multi-agent research system</span><span class="tag web">web</span>
        <span class="url">https://www.anthropic.com/engineering/built-multi-agent-research-system</span>
      </li> -->
    </ol>
  </div>

  <footer>Generated by the deep-research skill · {{DATE}}</footer>
</div>
</body>
</html>
